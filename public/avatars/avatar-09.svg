<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Pink background -->
  <circle cx="100" cy="100" r="100" fill="#FFB3D9"/>
  
  <!-- White circle frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Long straight black hair - back layer -->
  <ellipse cx="100" cy="80" rx="48" ry="60" fill="#1a1a1a"/>
  
  <!-- Hair extending down -->
  <rect x="52" y="110" width="96" height="50" fill="#1a1a1a" rx="8"/>
  
  <!-- Neck -->
  <rect x="88" y="125" width="24" height="30" fill="#FFE6D5"/>
  
  <!-- Face - pale skin tone -->
  <ellipse cx="100" cy="95" rx="36" ry="43" fill="#FFEEE0"/>
  
  <!-- Hair front strands -->
  <ellipse cx="70" cy="85" rx="15" ry="35" fill="#1a1a1a"/>
  <ellipse cx="130" cy="85" rx="15" ry="35" fill="#1a1a1a"/>
  
  <!-- Eyes -->
  <ellipse cx="88" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  <ellipse cx="112" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  
  <!-- Eyebrows -->
  <path d="M 80 82 Q 88 79 95 81" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 105 81 Q 112 79 120 82" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 100 95 L 100 105" stroke="#F5D5C0" stroke-width="2" stroke-linecap="round"/>
  <path d="M 96 105 Q 98 107 100 107 Q 102 107 104 105" stroke="#F5D5C0" stroke-width="1.5" fill="none"/>
  
  <!-- Soft smile -->
  <path d="M 88 115 Q 100 121 112 115" stroke="#E8C4A8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>