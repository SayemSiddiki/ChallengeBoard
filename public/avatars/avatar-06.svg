<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Yellow background -->
  <circle cx="100" cy="100" r="100" fill="#FDB827"/>
  
  <!-- White circle frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Face - medium skin tone -->
  <ellipse cx="95" cy="100" rx="35" ry="42" fill="#C68642"/>
  
  <!-- Neck -->
  <rect x="90" y="130" width="20" height="25" fill="#C68642"/>
  
  <!-- Ear -->
  <ellipse cx="130" cy="100" rx="8" ry="12" fill="#B87333"/>
  
  <!-- Short curly hair -->
  <path d="M 95 60 Q 70 55 60 70 Q 55 80 60 95 Q 65 105 75 110 L 80 105 Q 75 95 75 85 Q 75 75 80 70 Q 85 65 90 65 Q 95 65 95 60 Z" fill="#2C1810"/>
  
  <!-- More curls -->
  <circle cx="70" cy="70" r="8" fill="#2C1810"/>
  <circle cx="75" cy="80" r="7" fill="#2C1810"/>
  <circle cx="68" cy="85" r="6" fill="#2C1810"/>
  
  <!-- Light beard -->
  <path d="M 95 120 Q 90 125 88 128 L 92 128 Q 94 125 95 120 Z" fill="#3D2817" opacity="0.7"/>
  <path d="M 85 115 Q 82 120 82 123 L 86 122 Q 87 118 85 115 Z" fill="#3D2817" opacity="0.7"/>
  
  <!-- Eye -->
  <circle cx="85" cy="95" r="3" fill="#1a1a1a"/>
  
  <!-- Nose -->
  <path d="M 70 100 Q 68 105 70 108" stroke="#A66D3E" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Mouth - neutral -->
  <line x1="75" y1="115" x2="85" y2="115" stroke="#8B5A3C" stroke-width="2" stroke-linecap="round"/>
</svg>