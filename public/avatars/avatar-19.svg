<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Pink background -->
  <circle cx="100" cy="100" r="100" fill="#FFB3D9"/>
  
  <!-- White circle frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Green top -->
  <path d="M 75 140 Q 75 128 88 125 L 112 125 Q 125 128 125 140 L 125 160 L 75 160 Z" fill="#06D6A0"/>
  
  <!-- Neck -->
  <rect x="88" y="125" width="24" height="15" fill="#C68642"/>
  
  <!-- Face - medium skin tone -->
  <ellipse cx="100" cy="95" rx="37" ry="43" fill="#D4A373"/>
  
  <!-- Wavy hair -->
  <ellipse cx="100" cy="60" rx="45" ry="30" fill="#3D2817"/>
  <path d="M 55 78 Q 58 68 65 62 Q 75 58 90 58 Q 100 58 110 58 Q 125 58 135 62 Q 142 68 145 78" fill="#3D2817"/>
  
  <!-- Wave texture -->
  <path d="M 60 72 Q 70 68 80 72 Q 90 76 100 72 Q 110 68 120 72 Q 130 76 140 72" stroke="#2C1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Small earrings -->
  <circle cx="68" cy="105" r="3" fill="#FFD700"/>
  <circle cx="132" cy="105" r="3" fill="#FFD700"/>
  
  <!-- Eyes -->
  <ellipse cx="88" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  <ellipse cx="112" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  
  <!-- Eyebrows -->
  <path d="M 80 82 Q 88 79 95 81" stroke="#2C1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 105 81 Q 112 79 120 82" stroke="#2C1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 100 95 L 100 105" stroke="#BD8C5A" stroke-width="2" stroke-linecap="round"/>
  <path d="M 96 105 Q 98 107 100 107 Q 102 107 104 105" stroke="#BD8C5A" stroke-width="1.5" fill="none"/>
  
  <!-- Smile -->
  <path d="M 88 115 Q 100 121 112 115" stroke="#A87444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>