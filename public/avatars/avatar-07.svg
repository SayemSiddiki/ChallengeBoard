<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange background -->
  <circle cx="100" cy="100" r="100" fill="#FF8C42"/>
  
  <!-- White circle frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Neck -->
  <rect x="88" y="125" width="24" height="30" fill="#5D4037"/>
  
  <!-- Face - dark skin tone -->
  <ellipse cx="100" cy="95" rx="38" ry="45" fill="#6D4C41"/>
  
  <!-- Big curly hair -->
  <ellipse cx="100" cy="60" rx="50" ry="35" fill="#1a1a1a"/>
  
  <!-- Curls on sides -->
  <circle cx="60" cy="75" r="15" fill="#1a1a1a"/>
  <circle cx="140" cy="75" r="15" fill="#1a1a1a"/>
  <circle cx="55" cy="90" r="12" fill="#1a1a1a"/>
  <circle cx="145" cy="90" r="12" fill="#1a1a1a"/>
  
  <!-- More texture curls -->
  <circle cx="75" cy="55" r="10" fill="#0d0d0d"/>
  <circle cx="125" cy="55" r="10" fill="#0d0d0d"/>
  <circle cx="90" cy="50" r="8" fill="#0d0d0d"/>
  <circle cx="110" cy="50" r="8" fill="#0d0d0d"/>
  
  <!-- Eyes -->
  <ellipse cx="88" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  <ellipse cx="112" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  
  <!-- Eyebrows -->
  <path d="M 80 82 Q 88 80 95 82" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 105 82 Q 112 80 120 82" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 100 95 L 100 105" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <path d="M 95 105 Q 97 107 100 107 Q 103 107 105 105" stroke="#5D4037" stroke-width="1.5" fill="none"/>
  
  <!-- Soft smile -->
  <path d="M 88 115 Q 100 122 112 115" stroke="#4E342E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>