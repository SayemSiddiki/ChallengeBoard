<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Red background -->
  <circle cx="100" cy="100" r="100" fill="#E63946"/>
  
  <!-- White circle frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Face - light skin tone (facing right) -->
  <ellipse cx="105" cy="100" rx="35" ry="42" fill="#F5CBA7"/>
  
  <!-- Neck -->
  <rect x="90" y="130" width="20" height="25" fill="#F5CBA7"/>
  
  <!-- Ear -->
  <ellipse cx="70" cy="100" rx="8" ry="12" fill="#EAB491"/>
  
  <!-- Short hair -->
  <ellipse cx="105" cy="65" rx="35" ry="30" fill="#4A3728"/>
  <path d="M 70 80 Q 75 70 85 65 Q 95 62 105 60 Q 115 62 125 65 Q 135 70 140 80" fill="#4A3728"/>
  
  <!-- Eye -->
  <circle cx="115" cy="95" r="3" fill="#1a1a1a"/>
  
  <!-- Small nose -->
  <path d="M 130 100 Q 132 103 130 106" stroke="#E0A578" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Neutral mouth -->
  <line x1="115" y1="115" x2="125" y2="115" stroke="#D4956B" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Forehead/face contour -->
  <path d="M 140 85 Q 142 100 140 115 Q 138 125 132 130" stroke="#EAB491" stroke-width="1" fill="none" opacity="0.3"/>
</svg>