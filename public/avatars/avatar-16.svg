<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange background -->
  <circle cx="100" cy="100" r="100" fill="#FF8C42"/>
  
  <!-- White circle frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Face - medium skin tone (facing left) -->
  <ellipse cx="95" cy="100" rx="35" ry="42" fill="#C68642"/>
  
  <!-- Neck -->
  <rect x="88" y="130" width="20" height="25" fill="#C68642"/>
  
  <!-- Ear -->
  <ellipse cx="130" cy="100" rx="8" ry="12" fill="#B87333"/>
  
  <!-- Short hair -->
  <ellipse cx="95" cy="66" rx="36" ry="29" fill="#2C1810"/>
  <path d="M 59 82 Q 62 72 70 66 Q 80 62 90 61 Q 100 61 110 63 Q 120 66 128 72 Q 131 78 131 85" fill="#2C1810"/>
  
  <!-- Eye -->
  <circle cx="84" cy="95" r="3" fill="#1a1a1a"/>
  
  <!-- Nose -->
  <path d="M 69 100 Q 67 105 69 108" stroke="#A66D3E" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Mouth -->
  <line x1="74" y1="115" x2="84" y2="115" stroke="#8B5A3C" stroke-width="2" stroke-linecap="round"/>
</svg>