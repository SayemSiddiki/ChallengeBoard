<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Pink background -->
  <circle cx="100" cy="100" r="100" fill="#FF006E"/>
  
  <!-- White circle frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Neck -->
  <rect x="88" y="125" width="24" height="30" fill="#FFE4C4"/>
  
  <!-- Face - light skin tone -->
  <ellipse cx="100" cy="95" rx="38" ry="44" fill="#FFEEE0"/>
  
  <!-- Long hair -->
  <ellipse cx="100" cy="65" rx="48" ry="32" fill="#6B4423"/>
  <rect x="52" y="75" width="96" height="60" fill="#6B4423" rx="10"/>
  
  <!-- Hair front -->
  <ellipse cx="68" cy="82" rx="14" ry="32" fill="#6B4423"/>
  <ellipse cx="132" cy="82" rx="14" ry="32" fill="#6B4423"/>
  
  <!-- Eyes -->
  <ellipse cx="88" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  <ellipse cx="112" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  
  <!-- Eyebrows -->
  <path d="M 80 82 Q 88 79 95 81" stroke="#5D3A1A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 105 81 Q 112 79 120 82" stroke="#5D3A1A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 100 95 L 100 105" stroke="#F5D5C0" stroke-width="2" stroke-linecap="round"/>
  <path d="M 96 105 Q 98 107 100 107 Q 102 107 104 105" stroke="#F5D5C0" stroke-width="1.5" fill="none"/>
  
  <!-- Full beard -->
  <path d="M 75 108 Q 72 120 75 130 Q 82 140 92 143 Q 100 145 108 143 Q 118 140 125 130 Q 128 120 125 108" fill="#6B4423" opacity="0.9"/>
  <path d="M 70 110 Q 68 118 70 125 Q 75 132 82 136" fill="#5D3A1A" opacity="0.7"/>
  <path d="M 130 110 Q 132 118 130 125 Q 125 132 118 136" fill="#5D3A1A" opacity="0.7"/>
  
  <!-- Relaxed mouth -->
  <path d="M 90 116 Q 100 120 110 116" stroke="#E0CDB0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>