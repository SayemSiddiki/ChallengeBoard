<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Green background -->
  <circle cx="100" cy="100" r="100" fill="#06D6A0"/>
  
  <!-- White circle frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Neck -->
  <rect x="88" y="125" width="24" height="30" fill="#F5CBA7"/>
  
  <!-- Face - light skin tone -->
  <ellipse cx="100" cy="95" rx="38" ry="44" fill="#FFDDC1"/>
  
  <!-- Wavy hair -->
  <path d="M 55 85 Q 55 65 65 55 Q 75 50 85 52 Q 90 48 95 48 Q 100 48 105 48 Q 110 48 115 52 Q 125 50 135 55 Q 145 65 145 85" fill="#5D4037"/>
  
  <!-- Wave texture -->
  <path d="M 60 70 Q 70 65 80 70 Q 90 75 100 70 Q 110 65 120 70 Q 130 75 140 70" stroke="#4A3428" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 65 80 Q 75 76 85 80 Q 95 84 105 80 Q 115 76 125 80 Q 132 83 137 80" stroke="#4A3428" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <ellipse cx="88" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  <ellipse cx="112" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  
  <!-- Eyebrows -->
  <path d="M 80 82 Q 88 79 95 81" stroke="#4A3428" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 105 81 Q 112 79 120 82" stroke="#4A3428" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 100 95 L 100 105" stroke="#E8B697" stroke-width="2" stroke-linecap="round"/>
  <path d="M 96 105 Q 98 107 100 107 Q 102 107 104 105" stroke="#E8B697" stroke-width="1.5" fill="none"/>
  
  <!-- Neutral mouth -->
  <line x1="92" y1="115" x2="108" y2="115" stroke="#D4A078" stroke-width="2.5" stroke-linecap="round"/>
</svg>