<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange background -->
  <circle cx="100" cy="100" r="100" fill="#FF8C42"/>
  
  <!-- White circle frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Face - dark skin tone (facing right) -->
  <ellipse cx="105" cy="100" rx="36" ry="43" fill="#5D4037"/>
  
  <!-- Neck -->
  <rect x="90" y="130" width="22" height="25" fill="#5D4037"/>
  
  <!-- Ear -->
  <ellipse cx="69" cy="100" rx="8" ry="12" fill="#4E342E"/>
  
  <!-- Afro hair -->
  <circle cx="105" cy="75" r="42" fill="#1a1a1a"/>
  
  <!-- Afro texture -->
  <circle cx="85" cy="65" r="12" fill="#0d0d0d" opacity="0.5"/>
  <circle cx="105" cy="58" r="14" fill="#0d0d0d" opacity="0.5"/>
  <circle cx="125" cy="65" r="12" fill="#0d0d0d" opacity="0.5"/>
  <circle cx="95" cy="80" r="10" fill="#0d0d0d" opacity="0.5"/>
  <circle cx="115" cy="80" r="10" fill="#0d0d0d" opacity="0.5"/>
  
  <!-- Eye -->
  <circle cx="116" cy="95" r="3" fill="#1a1a1a"/>
  
  <!-- Nose -->
  <path d="M 130 100 Q 132 104 130 108" stroke="#4E342E" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Beard outline -->
  <path d="M 141 108 Q 138 120 132 128 Q 125 133 118 135" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 135 115 Q 132 122 128 127" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Mouth -->
  <line x1="118" y1="115" x2="128" y2="115" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
</svg>