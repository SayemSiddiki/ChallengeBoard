<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Pink background -->
  <circle cx="100" cy="100" r="100" fill="#FF006E"/>
  
  <!-- White circle frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Neck -->
  <rect x="88" y="125" width="24" height="30" fill="#C68642"/>
  
  <!-- Face - medium skin tone -->
  <ellipse cx="100" cy="95" rx="37" ry="43" fill="#D4A373"/>
  
  <!-- Hair top -->
  <ellipse cx="100" cy="58" rx="42" ry="28" fill="#2C1810"/>
  <path d="M 58 75 Q 60 65 70 60 Q 85 55 100 55 Q 115 55 130 60 Q 140 65 142 75" fill="#2C1810"/>
  
  <!-- Long braid going down left side -->
  <ellipse cx="65" cy="95" rx="10" ry="18" fill="#2C1810"/>
  <ellipse cx="62" cy="115" rx="9" ry="16" fill="#2C1810"/>
  <ellipse cx="60" cy="135" rx="8" ry="14" fill="#2C1810"/>
  <ellipse cx="58" cy="152" rx="7" ry="10" fill="#2C1810"/>
  
  <!-- Braid segments -->
  <line x1="67" y1="100" x2="73" y2="105" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="64" y1="120" x2="70" y2="123" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="62" y1="140" x2="67" y2="142" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Large hoop earrings -->
  <circle cx="68" cy="105" r="8" fill="none" stroke="#FFD700" stroke-width="3"/>
  <circle cx="132" cy="105" r="8" fill="none" stroke="#FFD700" stroke-width="3"/>
  
  <!-- Eyes -->
  <ellipse cx="88" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  <ellipse cx="112" cy="90" rx="4" ry="5" fill="#1a1a1a"/>
  
  <!-- Eyebrows -->
  <path d="M 80 81 Q 88 78 95 80" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 105 80 Q 112 78 120 81" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 100 95 L 100 105" stroke="#BD8C5A" stroke-width="2" stroke-linecap="round"/>
  <path d="M 96 105 Q 98 107 100 107 Q 102 107 104 105" stroke="#BD8C5A" stroke-width="1.5" fill="none"/>
  
  <!-- Confident smile -->
  <path d="M 86 114 Q 100 122 114 114" stroke="#A87444" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>